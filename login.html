<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in to Rigitaldemo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="nav-wrap">
      <a href="index.html" class="logo">Rigital<span>demo</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#registerSection">Sign Up</a></li>
        <li><a href="index.html#registerSection">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="index.html#registerSection" class="btn btn-solid">Get Started</a>
        <button class="hamburger" id="hamburgerBtn">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ================= LOGIN FORM ================= -->
  <section class="form-section">
    <h2>Log in to Rigitaldemo</h2>
    <p class="form-subtitle">Enter your details to continue</p>

    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required minlength="6">
      </div>
      <button type="submit" class="submit-btn">Log in</button>
    </form>

    <div class="divider">or continue with</div>
    <div class="social-row">
      <a href="https://www.google.com" target="_blank" rel="noopener noreferrer" class="social-btn">🔵 Google</a>
      <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer" class="social-btn">📸 Instagram</a>
    </div>

    <p class="form-footer-text">New to Rigitaldemo? <a href="index.html#registerSection">Create an account</a></p>
  </section>

  <footer>
    Rigitaldemo, 2026 © All rights reserved
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
