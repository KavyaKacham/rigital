<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in to Rigitaldemo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="nav-wrap">
      <a href="index.html" class="logo">Rigital<span>demo</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#registerSection">Sign Up</a></li>
        <li><a href="index.html#registerSection">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="index.html#registerSection" class="btn btn-solid">Get Started</a>
        <button class="hamburger" id="hamburgerBtn">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <section class="form-section">
    <h2>Log in to Rigitaldemo</h2>
    <p class="form-subtitle">Enter your details to continue</p>

    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required minlength="6">
      </div>
      <button type="submit" class="submit-btn">Log in</button>
    </form>

    <div class="divider">or continue with</div>
    <div class="social-row">
      <button type="button" class="social-btn social-google">🔵 Continue with Google</button>
      <button type="button" class="social-btn social-instagram">📸 Continue with Instagram</button>
    </div>

    <p class="form-footer-text">New to Rigitaldemo? <a href="index.html#registerSection">Create an account</a></p>
  </section>

  <footer>
    Rigitaldemo, 2026 © All rights reserved
  </footer>

    <script>
  const slides = document.querySelectorAll(".slide");
  const dotsWrap = document.getElementById("sliderDots");
  
  if (slides.length && dotsWrap) {
    let current = 0;
    let autoSlide;
  
    slides.forEach((_, i) => {
      const dot = document.createElement("div");
      dot.classList.add("dot");
      if (i === 0) dot.classList.add("active");
      dot.addEventListener("click", () => goToSlide(i));
      dotsWrap.appendChild(dot);
    });
    const dots = document.querySelectorAll(".dot");
  
    function goToSlide(index) {
      slides[current].classList.remove("active");
      dots[current].classList.remove("active");
      current = index;
      slides[current].classList.add("active");
      dots[current].classList.add("active");
    }
  
    function nextSlide() {
      goToSlide((current + 1) % slides.length);
    }
  
    function prevSlide() {
      goToSlide((current - 1 + slides.length) % slides.length);
    }
  
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    if (nextBtn) nextBtn.addEventListener("click", () => { nextSlide(); resetAutoSlide(); });
    if (prevBtn) prevBtn.addEventListener("click", () => { prevSlide(); resetAutoSlide(); });
  
    function resetAutoSlide() {
      clearInterval(autoSlide);
      autoSlide = setInterval(nextSlide, 4000);
    }
    resetAutoSlide();
  }
  
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  if (hamburgerBtn) {
    hamburgerBtn.addEventListener("click", () => {
      document.querySelector(".nav-links").classList.toggle("show");
    });
  }
  
  const registerForm = document.getElementById("registerForm");
  if (registerForm) {
    registerForm.addEventListener("submit", function (e) {
      e.preventDefault();
      const first = document.getElementById("firstName").value.trim();
      // Send the name to success.html via the URL so it can show a personalized message.
      window.location.href = "success.html?name=" + encodeURIComponent(first);
    });
  }
  
  const loginForm = document.getElementById("loginForm");
  if (loginForm) {
    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();
      // Demo only: no real backend, so this just takes the user back to the homepage.
      window.location.href = "index.html";
    });
  }
  
  const successHeading = document.getElementById("successHeading");
  if (successHeading) {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    if (name) {
      successHeading.textContent = "Welcome, " + name + "!";
      document.getElementById("successMessage").textContent =
        "Your Rigitaldemo account has been created successfully.";
    }
  }
  
  
  document.querySelectorAll(".social-google").forEach((btn) => {
    btn.addEventListener("click", () => {
      alert("Google sign-in will be connected here once the backend is set up.");
    });
  });
  document.querySelectorAll(".social-instagram").forEach((btn) => {
    btn.addEventListener("click", () => {
      alert("Instagram sign-in will be connected here once the backend is set up.");
    });
  });
  </script>
</body>
</html>
