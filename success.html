<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Rigitaldemo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="nav-wrap">
      <a href="index.html" class="logo">Rigital<span>demo</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
      <div class="nav-actions">
        <a href="index.html" class="btn btn-solid">Back to Home</a>
      </div>
    </div>
  </header>

  <section class="hero-dark success-page">
    <div class="hero-dark-inner">
      <div class="success-icon">✅</div>
      <h1 id="successHeading">Account Created</h1>
      <p id="successMessage">Welcome to Rigitaldemo. Your account is ready to go.</p>
      <a href="index.html" class="btn btn-white-pill">Back to Home</a>
    </div>
  </section>

  <footer>
    Rigitaldemo, 2026 © All rights reserved
  </footer>

    <script>
  const slides = document.querySelectorAll(".slide");
  const dotsWrap = document.getElementById("sliderDots");
  
  if (slides.length && dotsWrap) {
    let current = 0;
    let autoSlide;
  
    slides.forEach((_, i) => {
      const dot = document.createElement("div");
      dot.classList.add("dot");
      if (i === 0) dot.classList.add("active");
      dot.addEventListener("click", () => goToSlide(i));
      dotsWrap.appendChild(dot);
    });
    const dots = document.querySelectorAll(".dot");
  
    function goToSlide(index) {
      slides[current].classList.remove("active");
      dots[current].classList.remove("active");
      current = index;
      slides[current].classList.add("active");
      dots[current].classList.add("active");
    }
  
    function nextSlide() {
      goToSlide((current + 1) % slides.length);
    }
  
    function prevSlide() {
      goToSlide((current - 1 + slides.length) % slides.length);
    }
  
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    if (nextBtn) nextBtn.addEventListener("click", () => { nextSlide(); resetAutoSlide(); });
    if (prevBtn) prevBtn.addEventListener("click", () => { prevSlide(); resetAutoSlide(); });
  
    function resetAutoSlide() {
      clearInterval(autoSlide);
      autoSlide = setInterval(nextSlide, 4000);
    }
    resetAutoSlide();
  }
  
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  if (hamburgerBtn) {
    hamburgerBtn.addEventListener("click", () => {
      document.querySelector(".nav-links").classList.toggle("show");
    });
  }
  
  const registerForm = document.getElementById("registerForm");
  if (registerForm) {
    registerForm.addEventListener("submit", function (e) {
      e.preventDefault();
      const first = document.getElementById("firstName").value.trim();
      // Send the name to success.html via the URL so it can show a personalized message.
      window.location.href = "success.html?name=" + encodeURIComponent(first);
    });
  }
  
  const loginForm = document.getElementById("loginForm");
  if (loginForm) {
    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();
      // Demo only: no real backend, so this just takes the user back to the homepage.
      window.location.href = "index.html";
    });
  }
  
  const successHeading = document.getElementById("successHeading");
  if (successHeading) {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    if (name) {
      successHeading.textContent = "Welcome, " + name + "!";
      document.getElementById("successMessage").textContent =
        "Your Rigitaldemo account has been created successfully.";
    }
  }
  
 
  document.querySelectorAll(".social-google").forEach((btn) => {
    btn.addEventListener("click", () => {
      alert("Google sign-in will be connected here once the backend is set up.");
    });
  });
  document.querySelectorAll(".social-instagram").forEach((btn) => {
    btn.addEventListener("click", () => {
      alert("Instagram sign-in will be connected here once the backend is set up.");
    });
  });
  </script>
</body>
</html>
